<style>

/* ======================
SPACE PAGE (4열 갤러리)
====================== */

.space-section{
  padding:140px 0 80px;
  max-width:1100px;
  margin:auto;

  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:20px;
}

/* 🔥 카드 */
.space-card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  background:#000;
  transition:.4s ease;
}

/* 🔥 골드 라인 */
.space-card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:16px;
  padding:1px;
  background:linear-gradient(120deg,#f0e79f,transparent,#f0e79f);
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  opacity:.2;
  transition:.4s;
}

/* hover 효과 */
.space-card:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 50px rgba(0,0,0,.6);
}

.space-card:hover::before{
  opacity:1;
}

/* 이미지 */
.space-img{
  width:100%;
  display:block;
}

/* 오른쪽 아래 라벨 */
.space-label{
  position:absolute;
  right:10px;
  bottom:10px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:5px 10px;
  font-size:13px;
  border-radius:4px;
}

/* ======================
MODAL
====================== */

.modal{
  display:none;
  position:fixed;
  z-index:999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal img{
  max-width:90%;
  max-height:75%;
  border-radius:6px;
}

.modal-caption{
  margin-top:20px;
  color:#fff;
  font-size:18px;
}

/* ======================
반응형
====================== */

@media(max-width:900px){
  .space-section{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:500px){
  .space-section{
    grid-template-columns:1fr;
  }
}

</style>

<script>
// ======================
// MODAL (기존 기능 유지)
// ======================
function openModal(src, text){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-img").src = src;
  document.getElementById("modal-caption").innerText = text;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// ======================
// 모바일 햄버거 + 드롭다운 (아코디언)
// SNS 페이지와 완전히 동일하게 적용
// ======================
const hamburger = document.querySelector(".hamburger");
const nav = document.querySelector("header nav");
const navItems = document.querySelectorAll("header .nav-item > a");

function mobileMenuHandler() {
  hamburger.addEventListener("click", () => {
    nav.classList.toggle("active");
    hamburger.classList.toggle("open");
  });

  navItems.forEach(item => {
    item.addEventListener("click", (e) => {
      e.preventDefault();
      const parent = item.parentElement;
      parent.classList.toggle("active");
    });
  });
}

mobileMenuHandler();

window.addEventListener("resize", () => {
  nav.classList.remove("active");
  hamburger.classList.remove("open");
  document.querySelectorAll(".nav-item").forEach(ni => ni.classList.remove("active"));
});
</script>
